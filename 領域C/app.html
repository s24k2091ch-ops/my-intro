<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Chat Scheduler</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <main class="chat-container">
        <!-- チャット上部のヘッダー -->
        <header class="chat-header">
            <h1>スケジューラー 🤖</h1>
        </header>

        <!-- メッセージが流れるエリア -->
        <div class="chat-history" id="chat-history">
            <!-- JSでメッセージが追加されていきます -->
        </div>

        <!-- 画面下部の入力／ボタンエリア -->
        <footer class="chat-footer" id="chat-footer">
            
            <!-- 目的地を入力するテキストボックス -->
            <div id="input-text-area" class="input-area hidden">
                <input type="text" id="dest-input" placeholder="例: 横浜、渋谷 など">
                <button id="btn-send-dest" class="btn-send">送信</button>
            </div>

            <!-- 気分やアクティビティを選ぶボタンリスト -->
            <div id="input-button-area" class="input-area hidden">
                <!-- JSで動的にボタンが追加されます -->
            </div>

        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
